<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 12px -apple-system, Segoe UI, sans-serif; margin: 12px; color: #222; }
    label { display: block; margin: 8px 0 2px; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 10px; padding: 6px 12px; border: 0; border-radius: 4px; background: #18a0fb; color: #fff; cursor: pointer; }
    #status { margin-top: 10px; padding: 6px; border-radius: 4px; background: #eee; font-weight: 600; }
    .ok { background: #d6f5dd !important; }
    .err { background: #fbd6d6 !important; }
    pre { margin-top: 8px; max-height: 90px; overflow: auto; background: #f7f7f7; padding: 6px; border-radius: 4px; font-size: 11px; }
  </style>
</head>
<body>
  <label for="url">Relay URL</label>
  <input id="url" value="ws://localhost:3055" />
  <label for="channel">Channel</label>
  <input id="channel" value="default" />
  <button id="connect">Connect</button>
  <div id="status">Disconnected</div>
  <pre id="log"></pre>

  <script>
    var ws = null;
    function $(id) { return document.getElementById(id); }
    function log(m) { var l = $("log"); l.textContent = (m + "\n" + l.textContent).slice(0, 1500); }
    function setStatus(s, cls) { var el = $("status"); el.textContent = s; el.className = cls || ""; }

    function connect() {
      var url = $("url").value.trim();
      var channel = $("channel").value.trim() || "default";
      if (ws) { try { ws.close(); } catch (e) {} }
      setStatus("Connecting...");
      ws = new WebSocket(url);

      ws.onopen = function () { ws.send(JSON.stringify({ type: "join", channel: channel })); };

      ws.onmessage = function (ev) {
        var msg;
        try { msg = JSON.parse(ev.data); } catch (e) { return; }
        if (msg.type === "joined") { setStatus("Connected · channel: " + msg.channel, "ok"); return; }
        if (msg.type === "broadcast" && msg.payload && msg.payload.kind === "request") {
          var pl = msg.payload;
          log("> " + pl.command);
          parent.postMessage({ pluginMessage: { type: "execute", id: pl.id, command: pl.command, params: pl.params } }, "*");
        }
      };

      ws.onclose = function () { setStatus("Disconnected", "err"); };
      ws.onerror = function () { setStatus("Error — is the relay running? (npm run bridge)", "err"); };
    }

    window.onmessage = function (event) {
      var msg = event.data.pluginMessage;
      if (!msg || msg.type !== "result") return;
      log("< " + (msg.error ? "ERR " + msg.error : "ok"));
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "broadcast", payload: { kind: "response", id: msg.id, result: msg.result, error: msg.error } }));
      }
    };

    $("connect").onclick = connect;
    connect();
  </script>
</body>
</html>
